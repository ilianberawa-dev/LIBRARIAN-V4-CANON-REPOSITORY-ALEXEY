name: realty_openclaw

# OpenClaw self-hosted gateway + agent runtime.
# Читает /opt/realty-portal/.env — единый сейф (канон).
# Скиллы bind-mount из /opt/realty-portal/skills (source of truth в git).

networks:
  default:
    name: realty_net
    external: true

volumes:
  realty_openclaw_data:
    name: realty_openclaw_data
  realty_openclaw_workspace:
    name: realty_openclaw_workspace
  # npm-cache persists across `docker compose up --force-recreate`.
  # Без него первый вызов каждого MCP после recreate качает пакеты
  # с npm registry заново (~5 сек + зависимость от интернета).
  realty_openclaw_npm_cache:
    name: realty_openclaw_npm_cache

services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: realty_openclaw
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - realty_openclaw_data:/home/node/.openclaw
      - realty_openclaw_workspace:/home/node/.openclaw/workspace
      - realty_openclaw_npm_cache:/home/node/.npm
      - /opt/realty-portal/skills:/home/node/.openclaw/workspace/skills
    env_file:
      - /opt/realty-portal/.env
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
