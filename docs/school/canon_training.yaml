# ============================================================
# ИНВАРИАНТЫ ДЛЯ ВСЕХ РОЛЕЙ (читать и соблюдать!)
# ============================================================

role_invariants:
  one_role_one_chat:
    rule: "В любой момент — ровно ОДИН активный чат на роль. Переезд через handoff/<role>_v<N+1>.md"
    why: "Илья не должен путаться кому писать. Его слова: '2 школы, 5 парсеров, 3 секретаря — я потеряюсь'"
    trigger: "Контекст текущего чата → 70% — готовить handoff"

  read_on_start:
    rule: "Каждая сессия при старте читает: (1) этот yaml (2) свой outbox_to_<role>.md (3) handoff/<role>_v<latest>.md"
    why: "Преемственность без дубликации контекста"

  mailbox_comms:
    rule: "Межсессионные директивы и отчёты — ТОЛЬКО через docs/school/mailbox/. Не устно через Илью."
    why: "Илья = approval gate, не ретранслятор. Его время = деньги."
    files:
      outbox_to_<role>.md: "школа пишет → роль читает и исполняет"
      inbox_from_<role>.md: "роль отвечает/рапортует → школа читает в след. сессии"
      broadcast_queue.md: "кандидаты на рассылку всем — ждут одобрения Ильи"

  mailbox_re_check_protocol:
    rule: "Агент RE-reads свой outbox_to_<role>.md в начале каждого user-turn, перед каждым inbox-ответом, и при любом ожидании approval. Не доверять кешу первой загрузки."
    why: "Claude Code не имеет file-watcher. Если school допишет блок после старта агента — без re-check агент не увидит новую директиву. Илья не ретранслятор."
    triggers: [user_turn_start, task_start, task_finish_before_inbox_write, waiting_for_approval_check]
    block_format_required: "Каждый новый блок в outbox ОБЯЗАТЕЛЬНО начинается с `## YYYY-MM-DD HH:MM — <title>` — чтобы агент сортировал по времени и находил новые."
    agent_must_record: "В каждом inbox-ответе поле `last_checked_outbox: <timestamp файла> + <timestamp последнего блока который прочитал>`. Школа по нему видит что ещё не дошло."

  consensus_workshop_protocol:
    rule: "Илья инициирует обсуждение → школа орchestrирует консенсус между expert-ролями через итеративный feedback loop. Обсуждение закрывается когда нет новых counter-arguments + все правила канона соблюдены + Ilya final approve."
    why: "Илья 2026-04-21 ~23:00 сформулировал: 'обратная связь получил-послал-принял-ответил-дозадал-запросил доответ должна работать по циклу до фактом всестороннего канонического консенсуса'. Нужна формальная petli чтобы избежать бесконечных дискуссий ИЛИ преждевременных закрытий."

    roles_in_consensus:
      facilitator: "Ilya — открывает топик, даёт правила (canon), final approval"
      orchestrator: "school-v<N> — организует обсуждение, задаёт Q1..QN expert'ам, делает critique, declares consensus"
      expert: "Любая активная роль (librarian, parser, secretary) — отвечает в своей зоне экспертизы"

    feedback_loop:
      - step: 1_topic_open
        actor: Ilya
        action: "'обсудите X до консенсуса' или явное предложение к школе"
      - step: 2_formulate
        actor: school
        action: "Q1..QN в структурированном виде + приоритеты + формат ответа expert'у"
      - step: 3_expert_answer
        actor: expert
        action: "По каждому Q — конкретный ответ ИЛИ BLOCKED_ON (не пропускать)"
      - step: 4_school_critique
        actor: school
        action: "ACK / counter-argument / NEW concerns которые expert не поднял"
      - step: 5_expert_respond
        actor: expert
        action: "ACCEPT / REJECT / counter-counter по каждому школьному counter"
      - step: 6_loop_to_4
        condition: "Если есть открытые counter-arguments"
        action: "Школа делает следующий critique turn, expert отвечает. Повтор до схождения."
      - step: 7_consensus_declared
        actor: school
        condition: "Нет новых counter + все canon rules соблюдены + все experts ACK"
        action: "Запись в canon_training.yaml (semver bump) + в broadcast_queue если касается всех"
      - step: 8_ilya_final_approve
        actor: Ilya
        action: "Ilya reviews canon bump → ACK или переоткрывает цикл"
      - step: 9_implementation
        actor: relevant_expert
        action: "Код/конфиг/POC/tests на базе consensus"

    consensus_closure_conditions:
      must_all_be_true:
        - "Нет unresolved counter-arguments в последнем workshop turn"
        - "Все canon role_invariants соблюдены (re-check, split-addressing, delivery closure, context measurement)"
        - "Все active expert-роли ACK финального предложения"
        - "School-v<N> записала в consensus_workshop.md финальный сводный вердикт"
        - "Ilya final approved (в чате или explicit command)"

    ilya_operator_commands:
      open_discussion: "'обсудите X' / 'дайте критический разбор Y' / 'выработайте консенсус по Z'"
      route_message: "Ilya копирует dispatch-блок в целевой чат (манульный transport до MCP Agent Mail)"
      approve_canon_bump: "'да' / 'ok v0.4' / 'принимаю'"
      reopen_discussion: "'ещё раз' / 'не согласен' / 'добавь вопрос'"
      status_query: "'где консенсус?' / 'что blocked' / 'сколько turnov осталось'"

    anti_patterns_in_consensus:
      - "Школа declares consensus без ответа expert'а на counter-argument (premature closure)"
      - "Expert игнорирует counter-argument и повторяет свою позицию (loop без прогресса)"
      - "Ilya навязывает решение в середине цикла (breaks expert autonomy)"
      - "Consensus закрыт но canon не bumped (drift)"
      - "Consensus достигнут но NEW concerns всплывают при implementation (школа должна попросить re-open)"

    visibility:
      without_mcp: "dispatch_queue.md (pending actions) + inbox_from_*.md (expert responses) + consensus_workshop.md (dialog archive) + handoff/*.md (role state)"
      with_mcp_phase_1: "Все выше + Human Overseer UI http://localhost:8765/mail через SSH tunnel"
      ilya_single_view_goal: "Phase 2: все в одной точке (Human Overseer UI), dispatch_queue только для HANDOFF_TRIGGER/LAUNCHER_DISPATCH"

  context_measurement_rule:
    rule: "Source of truth для контекста роли = UI-индикатор Claude Code у Ильи. Роль НЕ оценивает контекст самостоятельно по tool calls / размеру файлов / tool results."
    why: "school-v1 2026-04-21 20:30 ошиблась на 45 процентных пунктов (думала 70%, реально 25%). Самооценка обманчива — внутренние системы сжимают / переиспользуют. Преждевременные handoff'ы = потеря времени."
    protocol:
      if_unsure: "Роль спрашивает Илью прямо: 'сколько % контекста у меня на твоём индикаторе?'"
      in_response: "Школа в каждом значимом ответе может указать `**Мой контекст (по индикатору Ильи):** XX%` если знает"
      handoff_trigger: "50% от UI-индикатора, не от самооценки"

  communication_delivery_closure:
    rule: "Каждое действие школы требующее межролевой коммуникации имеет явный state machine. Действие НЕ считается завершённым пока не достигнут state=forwarded (минимум)."
    why: "Илья 2026-04-21 20:28 прямо: 'коммуникационный тупик создан тобой'. Школа несёт ответственность за доставку, не только за генерацию. Без доставки — роль не узнает об approval/директиве, тупик."
    state_machine:
      composed: "школа сформулировала сообщение в своём ответе Илье"
      queued: "записано в docs/school/mailbox/dispatch_queue.md с меткой → TO:"
      delivered_to_ilya: "Илья видит блок в ответе школы или в dispatch_queue"
      forwarded: "Илья вручную скопировал блок и вставил в чат целевой роли (или — после MCP Agent Mail — автоматическая доставка)"
      acknowledged: "целевая роль прочитала и написала ack в своём inbox (после canon v0.3+ с ack_protocol)"
    school_obligation: "В КОНЦЕ каждого ответа Илье, если ответ содержит сообщение(я) для агентов — явный блок `## 📬 Delivery actions` со списком: (1) где блок лежит (путь + строки в dispatch_queue.md), (2) целевой чат (UI-имя), (3) действие Ильи (copy-paste), (4) ожидаемый ответ."
    phase_1_mcp_agent_mail: "После установки MCP Agent Mail — state_machine управляется MCP'шным ack_required=true. Школа больше не пишет delivery_actions — MCP сам гарантирует доставку."
    closure_check: "Если в ответе школы есть dispatch-блок НО нет 📬 Delivery actions — школа нарушила канон, turn считается неполным."

  memory_layers:
    rule: "Три явных слоя памяти, разные source-of-truth и разные скорости."
    why: "librarian-v2 idea #2 2026-04-21: 'куда писать' сейчас размыто. Разрез устраняет confusion. (v0.4: вынесен из communication_delivery_closure — yaml format fix.)"
    layers:
      ops:
        source_of_truth: "MCP Agent Mail (Phase 1 POC выполнен 2026-04-22). docs/school/mailbox/*.md = archive-only после migration."
        content: "все межролевые сообщения, ack'и, status updates, live-workshop диалоги"
        retention: "всегда (FTS search через MCP Agent Mail)"
      knowledge:
        source_of_truth: "LightRAG на Aeza (http://realty_lightrag:9621)"
        content: "канон-выжимки + важные архитектурные решения (только после 'принято' в broadcast_queue) + транскрипты Алексея"
        retention: "вечно, семантический поиск"
        promote_policy: "из ops → knowledge только после decision made, НЕ черновики. Скилл `promote-to-canon` — будущий артефакт."
        owner: "librarian-v<N> делает ingest, но это может стать bottleneck — план мониторить"
      code_and_secrets:
        source_of_truth: "Git repo (код) + /opt/realty-portal/.env + /opt/tg-export/.env (chmod 600)"
        content: "скрипты, конфиги, ключи"
        retention: "версионируется git'ом"

  anti_patterns_catalog:
    rule: "Список known anti-patterns в текущей архитектуре с планом устранения."
    why: "librarian-v2 idea #5 2026-04-21: catalog = sun-hygiene документ, пересматривается каждый canon bump."
    entries:
      AP-1_file_mailbox_no_watcher:
        status: "решается MCP Agent Mail Phase 1 POC"
        problem: "File-based mailbox без file-watcher — пропуски видны только при re-check"
        mitigation_now: "mailbox_re_check_protocol + school_global_scan"
      AP-2_school_bottleneck:
        status: "phase_2_mitigation"
        problem: "Все межролевые сообщения через школу (by design — approval gate). Когда школа off-chat — компания замирает."
        mitigation_future: "MCP Agent Mail contact_policy=auto для routine role-to-role. School = observer (copy-всем). Approval gate остаётся только на критичных broadcast'ах."
      AP-3_no_versioning_artifacts:
        status: "partially_solved"
        problem: "docs/school/*.md подписаны авторами без semver. Когда librarian-v3 перепишет library_by_module.md — diff нетривиален."
        mitigation: "Frontmatter `version: 1.0, author: <role>-v<N>, prev: <git-sha>` во всех docs/school/*.md. Применять когда canon bump."
      AP-4_monetization_exception:
        status: "accepted_as_exception"
        problem: "`monetization_chain_required` не применим к canon-обновлениям (какая монетизация у 'добавил principle #11'?)"
        rule: "canon_updates_exempt_from_monetization_chain — монетизация = гигиена, не feature. Exception документирован."
      AP-5_self_estimation_without_ground_truth:
        status: "resolved_by_context_measurement_rule_v0.3"
        problem: "Роль самооценивает контекст без ground truth. Пример: school-v1 ошиблась на 45% (думала 70%, было 25%). LLM сжимает/переиспользует — самооценка систематически ошибочна."
        mitigation: "context_measurement_rule (v0.3): source of truth = UI-индикатор у Ильи ТОЛЬКО. При отчётах явно помечать [measured: via Ilya UI] vs [estimate: self (unreliable)]."

  mailbox_transport_model:
    rule: "Mailbox живёт в локальной файловой системе ноута Ильи (Windows): `C:\\work\\realty-portal\\docs\\school\\`. Все Claude Code чаты открыты у Ильи на одном ноуте и имеют общий доступ к этой папке."
    why: "parser-v2 2026-04-21 корректно заметил 'Mailbox только локальный, на Aeza зеркала нет'. Это НЕ баг — это фича: дешёвый transport, zero sync cost, read/write атомарный через ОС."
    agents_filesystem_access:
      school-v1: "Windows local C:/work/... — прямой доступ"
      parser-rumah123-v2: "Windows local — прямой доступ к mailbox. Плюс SSH+paramiko к Aeza для своих скриптов (/opt/realty-portal/*)"
      librarian-v1: "Работает на Aeza напрямую (SSH сессия). Для mailbox читает через Windows-mount или Илья тянет scp → показывает"
      librarian-v2+: "Windows local C:/work/realty-portal/ — ПРЯМОЙ доступ (после mv). Librarian-v2+ открывается в Claude Code на ноуте Ильи, не headless на Aeza. SSH = только для infra-задач. Mailbox = shared Windows FS = zero sync cost."
      secretary-v1: "Windows local (когда стартует)"
    implication_for_cross_role_communication:
      - "Parser и school читают и пишут в одну папку одновременно. Нет network overhead, нет auth."
      - "Гонки possible но маловероятны (atomic writes, редкие записи)."
      - "Если один чат изменил файл — другой должен сделать Re-read (canon mailbox_re_check_protocol)."
      - "school НЕ может 'ping' parser в UI чата — только написать файл + ждать next user-turn parser'а."
    aeza_mirror_status: "Aeza НЕ имеет зеркала docs/school/. Если librarian хочет использовать canon_training.yaml — Илья делает rsync локально→Aeza или librarian читает через SSH mount. На 2026-04-21 этого нет."
    future_improvement: "Option A: rsync cron Windows→Aeza. Option B: git repo с docs/school/ (но канал Алексея приватный — .gitignore защитит). Option C: MCP filesystem server с доступом из headless чатов на Aeza."

  decision_2026_04_21_mcp_agent_mail:
    chosen: "MCP Agent Mail (https://github.com/Dicklesworthstone/mcp_agent_mail)"
    access_mode: "localhost-only + SSH tunnel + bearer token (Ilya 2026-04-21 22:15 — 'aeza защищённая папка')"
    rationale_no_domain: "Без публичного домена = zero attack surface + нет DNS config + канон #7 offline-first соблюдён строже. Cost $0 vs $1-9/год за домен."
    access_flow: "На ноуте Ильи: `ssh -L 8765:127.0.0.1:8765 root@193.233.128.21`. После — http://localhost:8765 на ноуте = MCP Agent Mail на Aeza. Claude Code MCP client указывает на localhost:8765 с bearer token."
    no_caddy: "Caddy НЕ ставим. FastMCP слушает 127.0.0.1:8765 только. Нет публичных endpoint'ов."
    migration_friendliness: "При переезде на азиатский VPS — любой VPS с SSH подходит, zero DNS changes, только меняется host в SSH команде."
    status: pending_ilya_approval_for_install
    rationale: "librarian-v2 research (3.A-3.F сводный вердикт) — 3/10 сложность, FastMCP+Git+SQLite, нативно покрывает identities, inbox/outbox, FTS search, file-leases, Human Overseer UI, archive+Doctor."
    what_replaces: "docs/school/mailbox/*.md → archive-only после Phase 1. Live communication через MCP Agent Mail."
    what_stays: "docs/school/canon_training.yaml, library_by_module.md, handoff/*.md, skills/*.md — это knowledge layer, не ops."
    phase_1_poc_plan:
      step_1: "Установка на Aeza /opt/mcp_agent_mail/, FastMCP :8765, Caddy proxy mail.<domain> с bearer token"
      step_2: "Regisztratsiya librarian-v2 identity, перенос 3 последних inbox-блоков в MCP threads"
      step_3: "school-v1 подключается через Claude Code MCP client, проверка visibility"
      eta: "1-2 часа librarian'у после Ильи permit"
    phase_2_rollout: "parser + secretary регистрируются как identities. Handoff через MCP threads + ack_required."
    phase_3_saas: "A2A agent.json для secretary при первом платящем клиенте."
    human_overseer_ui: "http://mail.<domain>:8765/mail — Илья пишет high-importance через Web UI, заменяет ручную ретрансляцию."
    tg_layer: "MCP Agent Mail hook on urgent/high → push Илье через librarian-bot (@PROPERTYEVALUATOR_bot). Best of both worlds."

  school_global_scan:
    rule: "School в начале КАЖДОГО user-turn делает `find docs/school/{mailbox,handoff,skills}/ -newer <last_user_turn>` чтобы найти все свежие изменения от агентов, не только в inbox."
    why: "Агенты могут отвечать в любом файле своей зоны — handoff amendments, новые skill-файлы, broadcast_queue. School как orchestrator обязана сканировать всю подведомственную зону, не только inbox."
    trigger: "before_every_response_to_ilya"
    example: |
      ls -lat docs/school/{mailbox,handoff,skills}/ | head -20
      # потом Read свежих файлов по sort -rn
    note: "Это школе-специфичное правило (не для агентов). Агенты читают свой outbox; school читает ВСЁ."
    alias: "school_inbox_re_check_protocol (симметрично mailbox_re_check_protocol для агентов — см. предложение librarian-v2 в inbox 2026-04-21)"
    agent_must_record_symmetric: "School в своём ответе Илье фиксирует `last_scanned: <timestamp mtime самого свежего файла>` чтобы быть явной"

  handoff_promptting_quality:
    rule: "Запрос на amendments к handoff'у должен содержать конкретный чеклист вопросов, а не абстрактное 'допиши 5-10 строк'"
    why: "Когда агент в критической зоне — он может написать 500-1000 строк на открытый вопрос впустую. Конкретные вопросы экономят его последние токены."
    trigger_threshold: "50% контекста (не 70%) — на 50-70% Claude Code уже сжимает контекст и детали начинают теряться."
    template_questions: ["последний incident последнего часа", "известные баги которых нет в inbox", "ограничения/квоты/лимиты свежие", "точные URL/пути endpoints", "что сейчас в процессе (what on the wire)"]

  split_addressing_in_inbox:
    rule: "Inbox-ответ агента ВСЕГДА разделён на две секции по адресату: `## TO_SUCCESSOR` (ops/TODO для следующей версии себя) и `## TO_SCHOOL` (архитектурные наблюдения, канон-инсайты, находки для синтеза)"
    why: "У сообщений разная аудитория и разная судьба. Successor нужны конкретные команды что делать дальше. School нужен абстрактный архитектурный сигнал который попадёт в canon_training / skills для всей компании. Смешивая их — теряем оба."
    format: |
      ## TO_SUCCESSOR
      - [P0] task1 — что сделать + входы + ожидаемый выход
      - [P1] task2
      - blocked_on: <approval/external>

      ## TO_SCHOOL
      - insight1: <наблюдение про канон/паттерн/грабли> — what и why
      - insight2: <предложение правила / директивы / дополнения>
    applies_to: "все inbox_from_<role>.md"
    legacy_allowed: "старые блоки без разделения можно оставлять, переход с 2026-04-21"

  canon_version_check_on_turn_start:
    rule: "В начале каждого user-turn агент читает `head -3 docs/school/canon_training.yaml`, извлекает `version: X.Y`, сравнивает с last_read_canon_version из handoff/MEMORY. Mismatch → FULL re-read canon + log событие в inbox."
    why: "Gap I-8 — роль может работать на устаревшем каноне без ведома. librarian-v2 попался дважды. Native enforcement через MCP: школа шлёт [CANON UPDATE] ack_required=true при каждом bump."
    automation_after_mcp: "При canon bump school отправляет send_message(to=['all-active'], subject='[CANON UPDATE] v0.4', thread_id='canon-updates', ack_required=true). Роли ack до продолжения."

  role_inbox_exit_closure:
    rule: "Перед закрытием сессии роль ОБЯЗАНА записать exit-блок в свой inbox_from_<role>.md: (1) last_checked_outbox timestamp, (2) незавершённые tasks, (3) blocked_on, (4) TO_SUCCESSOR queue."
    why: "Symmetric к communication_delivery_closure школы. Роль несёт ответственность за передачу state следующей версии. Без exit-closure следующая версия = холодный старт, ~30 мин потерь."
    format: "Minimum: `## YYYY-MM-DD HH:MM — [SESSION CLOSING] <role>-vN` + `### TO_SCHOOL` + `### TO_SUCCESSOR` sections."

  handoff_amendments_protocol:
    rule: "Правки к handoff ПОСЛЕ его написания записываются в отдельную секцию `## amendments (YYYY-MM-DD HH:MM)` в конце файла. Основное тело handoff НЕ редактируется (snapshot неизменен)."
    why: "Handoff = snapshot состояния в момент T0. Амендменты = что изменилось после T0. Смешение = потеря временной метки 'что было известно когда'."
    trigger: "любая критичная правка после initial handoff write (баги, смена архитектуры, новые блокеры)"

  thread_id_naming_conventions:
    rule: "MCP Agent Mail thread_id строго по namespace-конвенции. Произвольные имена запрещены."
    why: "Без namespace search_messages(thread_id='*-to-school') не работает как canonical query. Zoo имён = O(N²) complexity при поиске."
    namespaces:
      role_to_school: "<role>-to-school"
      role_to_successor: "<role>-to-successor"
      research: "research-<topic>-<subtopic>"
      workshop: "workshop-<topic>"
      handoff: "handoff-<role>-v<N>-to-v<N+1>"
      presence: "presence"
      canon_updates: "canon-updates"
      slo_breaches: "delivery-slo-breaches"

  mcp_session_start_sequence:
    rule: "Каждый агент в начале user-turn выполняет 4-шаговую последовательность через MCP Agent Mail."
    why: "Стандартизация start-sequence = AP-1 mitigation (no re-check miss) + I-8 canon drift detection + I-2 eventual consistency."
    steps:
      1: "presence_ping: send_message(to=['school-v2'], subject='[PRESENCE]', thread_id='presence', importance='low', ack_required=false)"
      2: "fetch_inbox: msgs = fetch_inbox(agent_name=<role>, limit=50)  # result в structuredContent.result[], не .messages[]"
      3: "ack_loop: for m in msgs: mark_message_read(message_id=m.id)  # single int, не список"
      4: "reply/act: send_message(...) если есть что ответить"
    note: "Это documentation pattern, не macro extension. 4 отдельных tool call'а. Получатель должен быть зарегистрирован."

  ilya_alert_sla:
    rule: "SLA когда Илье отправляется TG push (cron + notify.sh). Нарушение = Илья не получил alert вовремя."
    why: "Разделено с role_internal_sla (librarian-v2 23:00 ACCEPT). ilya_alert = внешний SLA (push к человеку), role_internal = внутренний дедлайн роли."
    table:
      urgent: "TG push < 5 min от send_message"
      high: "TG push < 15 min"
      normal: "нет push (роль увидит при следующем turn'е)"
      low: "нет push"

  role_internal_sla:
    rule: "SLA когда роль ОБЯЗАНА прочитать и ack сообщение. Offline роль ≠ нарушение — это expected state."
    why: "Разделено с ilya_alert_sla. Offline роль = AP-2 (school-bottleneck known issue) — нормально, не экстренно."
    table:
      urgent: "ack < 15 min (при следующем user-turn)"
      high: "ack < 1 hour"
      normal: "ack < 8 hours"
      low: "ack < 24 hours"

  project_key_convention:
    rule: "project_key в MCP Agent Mail = Linux-absolute путь на Aeza: `/opt/realty-portal/docs/school`. НЕ Windows path."
    why: "NEW-1 + NEW-10 (POC): Path.is_absolute() для Windows-path на Linux возвращает False → SQLite FTS equality fails. MCP сервер работает на Aeza, ему нужен его локальный path."
    canonical_value: "/opt/realty-portal/docs/school"
    note: "Windows side ASCII path (C:\\work\\realty-portal) НЕ используется как project_key. Aeza side неизменен. ensure_project(human_key='/opt/realty-portal/docs/school')."

  offsite_backup_policy:
    rule: "Критичные артефакты MCP Agent Mail минимум на двух независимых носителях."
    why: "NEW-8: Aeza single-point failure. Ноут на Бали (влажность). Одновременный отказ маловероятен только если backup реален, не гипотетический."
    implementation:
      daily_aeza: "cron: `uv run ... cli archive save --label $(date +%F)` → /opt/backups/mcp_mail_<date>.zip"
      offsite_a: "Windows-ноут pull: `scp root@aeza:/opt/backups/*.zip C:/work/backups/aeza/` (daily cron)"
      offsite_b: "Backblaze B2 `b2 sync` — $0.005/GB/мес (Phase 3)"
    retention: "30 дней daily + 12 weekly + 6 monthly"
    phase: "Phase 3 hardening (после 1 недели стабильной работы)"

  launcher_mcp_bootstrap:
    rule: "Все launcher-файлы ролей включают секцию MCP bootstrap в начале."
    why: "NEW-2: без явной секции новый агент не знает что нужен register_agent + ensure_project перед первым send_message. Холодный старт без bootstrap = broken first turn."
    required_section: |
      ## MCP Agent Mail bootstrap (выполнить ПЕРВЫМ в сессии)
      1. SSH tunnel: `ssh -L 8765:127.0.0.1:8765 root@193.233.128.21`
      2. ensure_project(human_key='/opt/realty-portal/docs/school')
      3. При первом старте роли: register_agent(program='claude-code', model='claude-sonnet-4-6', name='<role>-vN')
      4. request_contact к каждой роли с которой хочешь общаться (если их policy не 'open')
      5. mcp_session_start_sequence (4 шага выше)
    applies_to: "все docs/school/launcher_*.md файлы"

  ilya_overseer_bypass:
    rule: "MCP Agent Mail Human Overseer identity (ilya-overseer) имеет нативный bypass contact_policy. Все роли получают от него сообщения независимо от policy."
    why: "NEW-7: без bypass ilya-overseer не мог бы писать ролям с policy=contacts_only (secretary, linkedin-*). Проверено в POC Step 9."
    implementation: "При register_agent: set_contact_policy('contacts_only', allowlist=['ilya-overseer']). Failsafe: Human Overseer Web UI bypasses нативно."
    caution: "Bypass НЕ снимает защиту #11 architectural_privilege_isolation. Prompt injection через external msg не получает доп-инструменты secretary."

  mcp_api_usage:
    rule: "Правильные параметры и паттерны MCP Agent Mail tools (gotchas из POC T1-T10 2026-04-22)."
    why: "Документация MCP Agent Mail расходится с фактическим API. Без этих заметок роли тратят time на debug вместо работы."
    tools:
      ensure_project:
        correct: "ensure_project(human_key='/opt/realty-portal/docs/school')"
        wrong: "ensure_project(project_key=...) — параметр называется human_key, не project_key"
      fetch_inbox:
        correct: "result = fetch_inbox(agent_name=..., limit=50); messages = result['structuredContent']['result']"
        wrong: "result['messages'] — такого поля нет"
        note: "default limit=20; для полной истории всегда указывать limit≥50"
      mark_message_read:
        correct: "mark_message_read(message_id=123)  # single int"
        wrong: "mark_message_read([123, 124])  # не список"
      register_agent:
        correct: "register_agent(program='claude-code', model='claude-sonnet-4-6', name='librarian-v3')"
        note: "все три поля обязательны"
      first_contact_flow:
        rule: "Перед первым send_message к агенту — request_contact(to=<agent>). Если контакт не установлен — send_message вернёт ошибку и создаст pending request. respond_contact чтобы принять входящий request."
        note: "Агент-получатель должен быть зарегистрирован в том же project_key"

dispatch_protocol:
  rule: "Школа ВСЕГДА оборачивает forward-сообщения в fenced code-block с меткой первой строкой. Никакого inline-текста для пересылки."
  why: "Илья копирует мышью. Только fenced block в Claude Code UI показывает Copy-кнопку. Без этого Илья вынужден использовать скриншот-ножницы."
  label_format: "→ TO: <role>-v<N>  |  [TRANSACTION_TYPE]  |  <timestamp>"

  transaction_types:
    RE-CHECK_PING:
      description: "Напомнить агенту перечитать свой outbox"
      auto_approved: true
      example: |
        → TO: <role>-v<N>  |  [RE-CHECK PING]  |  <YYYY-MM-DD HH:MM>
        Re-read docs/school/mailbox/outbox_to_<role>.md целиком.
        Новые блоки: <список>.
        Правило re-check — canon_training.yaml → role_invariants.mailbox_re_check_protocol.
      note_from_librarian_v2: "использовать <role>-плейсхолдер, не конкретный адрес (избегать ошибки когда school копирует пример для одной роли другой)"

    CANON_UPDATE:
      description: "canon_training.yaml изменился, все роли должны перечитать"
      auto_approved: true
      example: |
        → TO: all-active-roles  |  [CANON UPDATE]  |  2026-04-21 15:30
        Re-read docs/school/canon_training.yaml.
        Новое: role_invariants.mailbox_re_check_protocol + handoff_promptting_quality + split_addressing_in_inbox + dispatch_protocol.

    APPROVAL_PACK:
      description: "Пачка approvals по задачам в outbox"
      auto_approved: false
      notes: "Требует явного одобрения Ильи т.к. содержит реальные решения (permit на код, запуск процессов)"

    HANDOFF_TRIGGER:
      description: "Попросить писать handoff при 50% контекста + передать чеклист вопросов"
      auto_approved: false
      notes: "Требует Ильи т.к. инициирует переезд сессии — ручное подтверждение нужно"

    LAUNCHER_DISPATCH:
      description: "Launcher-prompt для нового чата (создание роли)"
      auto_approved: false
      notes: "Илья сам решает когда открывать новый чат"

  queue_file: docs/school/mailbox/dispatch_queue.md
  queue_schema: |
    ## YYYY-MM-DD HH:MM — [TRANSACTION_TYPE] → <role>
    status: pending_approval | auto_approved | sent
    approved_by: <ilya / auto>
    sent_at: <timestamp or ->
    body: |
      \`\`\`
      → TO: ...
      ... текст ...
      \`\`\`

  future_automation_path:
    phase1_now: "Илья вручную копирует из dispatch_queue → paste в Claude Code чат роли"
    phase2_soon: "auto_approved транзакции школа помечает sent сразу, Илья видит постфактум"
    phase3_later: "librarian-bot push в Telegram Илье с готовым текстом → Илья одним copy/paste в UI"
    phase4_ceiling: "Полной автопересылки в чужой Claude Code чат НЕТ — API не существует. Минимум = 1 paste."

  source_of_truth_per_artifact:
    rule: "Для каждого артефакта ЗАРАНЕЕ определён источник правды. Не редактировать одновременно в двух местах"
    why: "Избежать разветвления/потери правок. Бали-влажность + один сервер = риск"
    mapping:
      канон_сырой: "Aeza /opt/tg-export/ → rsync локально (read-only)"
      транскрипты: "Aeza (generates) → scp локально (read-only)"
      школа_docs: "локально (школа пишет) → sync на Aeza"
      supabase_dump: "Aeza → периодический dump локально"
      env_keys: "Aeza (chmod 600), НЕ копировать локально"

  two_independent_storages:
    rule: "Любой критичный артефакт минимум на двух независимых носителях"
    why: "1 TB локального диска на Бали (влажность) + Aeza. Одновременный отказ крайне маловероятен — но только если копии реальны."

  monetization_chain_required:
    rule: "Каждое предложение новой фичи/роли/решения должно содержать цепочку монетизации (2-3 шага до денег)"
    why: "Илья учится архитектуре бизнес-IT. Техника без денежной цепочки = хобби, не продукт."

  new_role_gate:
    rule: "Прежде чем запускать новую роль — school отвечает на 3 вопроса в broadcast_queue.md: (1) В какой BU/IU? (2) Минимум 2 синергии с существующими? (3) Цепочка монетизации 2-3 шага?"
    why: "Защита от фичеризма. Время Ильи — единственный bottleneck."

# ============================================================
# MAILBOX RELIABILITY INVARIANTS (v0.4)
# ============================================================

mailbox_reliability_invariants:
  description: "10 SLO-инвариантов не-падающего обмена сообщениями. Все роли соблюдают. POC T1-T10 валидируют каждый."
  status: "validated — POC T1-T10 10/10 PASS 2026-04-22"
  test_suite_file: "docs/school/tests/mailbox_reliability_v1.md"
  invariants:
    I-1:
      name: "at_least_once_delivery"
      rule: "Сообщение не теряется. Повторный ack = no-op."
      measurement: "ack_timestamp < send_timestamp + SLA (5 min max для urgent)"
      poc_test: "T1 baseline"
    I-2:
      name: "eventual_consistency"
      rule: "Все роли видят согласованное состояние mailbox."
      measurement: "delta(view_role_A, view_role_B) < 1 turn"
      poc_test: "T4 concurrent"
    I-3:
      name: "atomic_writes"
      rule: "Никто не видит half-written сообщение."
      measurement: "SQLite WAL transaction"
      poc_test: "T8 cold_restart"
    I-4:
      name: "total_ordering"
      rule: "У всех ролей одинаковый порядок сообщений в thread."
      measurement: "monotonic message_id + FTS rank"
      poc_test: "T4 concurrent"
    I-5:
      name: "re_readability_audit"
      rule: "Любое сообщение в истории, searchable."
      measurement: "FTS5 + git daily commit + Ed25519 export"
      poc_test: "T6 corruption"
    I-6:
      name: "idempotency_of_reads_acks"
      rule: "Повторный ack не ломает state."
      measurement: "duplicate ack = no-op (fingerprint check)"
      poc_test: "T1 baseline (повторный вызов)"
    I-7:
      name: "offline_delivery"
      rule: "Роль off-line → при следующем старте получает все missed сообщения."
      measurement: "stored-and-forward, fetch_inbox(limit=50) на start"
      poc_test: "T3 offline"
    I-8:
      name: "canon_drift_detection"
      rule: "Роль не работает на устаревшем каноне. Mismatch → re-read + ack."
      measurement: "canon_version_check_on_turn_start + CANON_UPDATE ack_required=true"
      poc_test: "T5 canon_drift"
    I-9:
      name: "handoff_safety"
      rule: "vN→vN+1 без gap в сообщениях. v(N+1) начинает с last_ack_vN."
      measurement: "handoff включает last_ack_ts; v(N+1) fetch_inbox(since=last_ack)"
      poc_test: "T7 handoff_safety"
    I-10:
      name: "observability"
      rule: "Илья видит state всей системы в одной точке."
      measurement: "Human Overseer UI http://localhost:8765/mail через SSH tunnel"
      poc_test: "T2 fan_out"

# ============================================================
# 10 ПРИНЦИПОВ АЛЕКСЕЯ (канон)
# ============================================================

principles_alexey:
  - id: 0_simplicity_first
    rule: "ПЕРЕД ответом: Как обычные люди решают? Есть ли простое стандартное решение? Не усложняю ли я? Предлагай САМОЕ простое ПЕРВЫМ."
    why: "AI склонен к overengineering. 2 часа на permissions/settings когда git push = 5 минут. Пользователь НЕ хочет учиться/настраивать - хочет РЕШЕНИЕ СЕЙЧАС."
    money: "Каждый час потерянный на сложное решение = потерянный час на монетизацию. Время Ильи = деньги."
    decision_tree: "Copy-paste (<100KB) → GitHub/Cloud (<10MB) → Settings/Config (ПОСЛЕДНЕЕ)"
    mandatory_checks:
      - "Бабушка-тест: можешь объяснить за 30 секунд бабушке? Если НЕТ → ищи проще"
      - "Счёт шагов: 1-2 шага ✅ | 3-5 шагов ⚠️ упрости | 6+ шагов ❌ ОБЯЗАТЕЛЬНО упрости"
      - "Таймер пользователя: <5 мин ✅ | 5-15 мин ⚠️ есть быстрее? | >15 мин ❌ юзер уйдёт"
    anti_patterns:
      - "❌ 'Сначала разберёмся в деталях...'"
      - "❌ 'Есть 5 способов, выбирайте...'"
      - "❌ Технические объяснения без запроса"
      - "❌ Настройка конфигов как первое решение"
      - "❌ Создание сложных артефактов для простых задач"
    canon_ref: "claude-library kanon/simplicity-first-principle.md (605 lines, GitHub: ilianberawa-dev/LIBRARIAN-V4-CANON-REPOSITORY-ALEXEY)"
    priority: "P0 - применять ПЕРЕД всеми остальными принципами"
    created: "2026-04-24 after 2 hours user frustration → 5 min solution"
    applies_to: "ВСЕ роли БЕЗ исключений"

  - id: 1_portability
    rule: "Только официальные Docker-образы. `docker compose up -d` на свежем VPS = всё работает"
    why: "Катастрофоустойчивость + дёшево переехать"
    money: "Новый VPS за минуты = нулевой downtime → нулевая потеря revenue"
    canon_ref: [msg_11, msg_13, msg_15, msg_55, msg_136]

  - id: 2_minimal_integration_code
    rule: "Вместо кастомного Python/JS — n8n ноды + Skills + MCP серверы. Логика в конфигах, не в обвязке."
    why: "Меньше кода → меньше багов → быстрее меняешь"
    money: "Маржа времени на новую фичу ×5. Время Ильи = деньги."
    canon_ref: [msg_71, msg_94, msg_95, msg_97]

  - id: 3_simple_nodes
    rule: "Одна нода/скрипт = одна задача. Не комбайны."
    why: "Композиция легко отлаживается, монолит — нет"
    canon_ref: [msg_66, msg_76, msg_101]

  - id: 4_skills_over_agents
    rule: "Skill > Agent > Hardcoded prompt. Логика в SKILL.md, не в длинных промптах."
    why: "Скиллы версионируются, переиспользуются, тестируются. Агент без скиллов — болтун."
    money: "Один SKILL = N-кратное переиспользование через проекты."
    canon_ref: [msg_172, msg_174, msg_178]

  - id: 5_minimal_clear_commands
    rule: "Императивные короткие инструкции агентам. Fail-loud на плохих входах. Без пространства для галлюцинаций."
    why: "Коридор без фантазий. Агент не импровизирует — не ломает продакшн ночью."
    canon_ref: [msg_178, feedback_alexey_skills_philosophy]

  - id: 6_single_secret_vault
    rule: "Все ключи в ЕДИНОМ .env. Никогда в fallback/хардкоде в коде."
    why: "Ротация = одно место. Утечка = одно место."
    example_violation: "normalize_listings.py строки 40-42 — ключ LiteLLM в fallback (висит в outbox_to_parser)"
    canon_ref: [feedback_single_secret_vault]

  - id: 7_offline_first
    rule: "Свой сервер/локалка. Cloud только где реально нужен."
    why: "Никто не кинет. Дешевле на масштабе."
    canon_ref: [msg_39, msg_48, msg_158]

  - id: 8_validate_before_automate
    rule: "Месяц триал → оценить ценность → решить продление. Не вкладываться в автоматизацию на непроверенных данных."
    canon_ref: [project_alexey_subscription_plan]

  - id: 9_human_rhythm_api
    rule: "Симулировать человеческое поведение. Случайные паузы 1-5 мин, перерывы 5-20 мин, длинные 30-90 мин. Не бёрстить."
    why: "Банят регулярные паттерны. CF уже режет 17/72 detail-pages на Rumah123 → недобранные телефоны агентов."
    money: "Каждый блок = недополученные контакты = недополученные комиссии $10-50k со сделки"
    pattern: "Медленно в одном портале + быстро переключаясь между разными + случайные длинные перерывы (eat/sleep/distraction)"
    priority: "CRITICAL для parser-*, librarian, linkedin-*"
    canon_ref: "tg_download_aeza.mjs (эталон реализации у librarian)"
    note_ilya_2026-04-21: "раз в 2 часа уже работает, но в целом неэффективно — нужна не-периодическая человеческая маскировка"

  - id: 10_content_factory_model
    rule: "Парсинг доноров → фильтр по качеству → пересборка в свой стиль → автопубликация"
    why: "Масштаб через скиллы, не через найм"
    canon_ref: [msg_101, msg_102, msg_103, msg_104]

  - id: 11_architectural_privilege_isolation
    rule: "Критичные права ограничены архитектурно (у агента физически нет инструмента навредить), НЕ промптом ('тебе нельзя делать X')."
    why: "Prompt injection обходит prompt-based защиту в 90-100% случаев (arXiv Adaptive Attacks). Единственная надёжная защита — архитектурная. Пример: агент поддержки не должен иметь скилл `supabase-query(sql:...)` потому что injection может его использовать. Вместо этого — `get-driver-status(id:...)` с зашитым SQL."
    money: "Один injection-attack на клиентском агенте = штраф 152-ФЗ до 6 млн руб (РФ) + потеря клиентской базы. Архитектурная изоляция = страховка от катастрофы."
    canon_ref: ["msg_168 (Мультиагентные AI-системы PDF, разбор librarian-v2 2026-04-21)", "arXiv:2404.02151 Adaptive Attacks"]
    applies_to: [secretary, future_client_facing_roles]
    examples:
      bad: "supabase-query(sql: '...') — generic, агент пишет SQL. Prompt injection → DROP TABLE."
      good: "get-listing-phone(listing_id: int) — зашитый SQL, только параметризованный input. Injection физически не может позвонить DROP."

