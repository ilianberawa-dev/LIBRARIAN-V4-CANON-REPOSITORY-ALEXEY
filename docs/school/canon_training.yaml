# ============================================================
# МОДЕЛЬ КОМПАНИИ
# ============================================================
# Это одна система, а не три параллельных бизнеса. Выход одного BU
# становится сырьём для другого. Общая инфра + общий канон + общий mailbox.

company_model:
  ceo: "Илья — человек, approval gate. Единственный ограниченный ресурс = его время."
  advisor: "school-v<N> — координирует, аудирует, учит. НЕ исполняет — исполняют BU/IU."

  business_units:
    BU1_education:
      owner: school
      product: "Методология → подписочная школа брокерам/солопренёрам"
    BU2_content_factory:
      owners: [parser-rumah123, linkedin-parser, linkedin-writer]
      product: "Данные (SaaS брокерам) + контент-активы (органический трафик, подписка)"
    BU3_chief_of_staff:
      owner: secretary
      product: "Управление каналами/временем брокера. Подписка $500-2000/мес после dog-food."

  infrastructure_units:
    IU1_librarian:
      owner: librarian
      product: "Канонная база Алексея (knowledge asset). Не продаётся — снижает cost всех BU."
    IU2_common_infra:
      stack: "Aeza VPS + Supabase + docker-compose + единый .env + mailbox + canon_training.yaml"
      effect: "Нулевой маржинальный cost на новый BU."
    IU3_multi_model_gateway:
      owner: parser-rumah123 (первый consumer, но не owner долгосрочно)
      stack: "LiteLLM на Aeza, :4000 port, /v1/chat/completions endpoint"
      product: "Unified API для Claude/Gemini/Grok/Qwen/DeepSeek/Kimi через один endpoint"
      effect: "Multi-model triangulation для всех ролей (защита от single-LLM biases). 40-60% экономия на раскладке моделей (msg_168 Алексей)."
      access_plan: "Все роли через MCP tool. Shared bearer token в .env. Quota per-role в LiteLLM admin."
      librarian_idea_ref: "IU3 вынесен из parser scope — librarian-v2 argued 2026-04-21 idea #4"

  main_metric: "Время Ильи → деньги. Новая роль добавляется ТОЛЬКО если освобождает его часы ИЛИ конвертирует их эффективнее."

