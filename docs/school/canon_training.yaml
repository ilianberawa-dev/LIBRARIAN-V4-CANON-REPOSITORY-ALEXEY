versioning:
  rule: "Semver (MAJOR.MINOR). Bump MINOR при любом role_invariant / principle / model_change. Bump MAJOR при breaking изменении формата (смена storage transport, переезд на MCP Agent Mail)."
  why: "librarian-v2 2026-04-21 показал капкан 'v0.1 + 4 тихих правки за день' — пропустил обновления. Semver + ritual bumping делает невозможным молчаливый drift."
  process: "Каждый turn школы который правит role_invariant/principle → bump version + append в changelog. Роли при старте сравнивают `version` с `last_read_version` в своём handoff → при mismatch делают full re-read."
  changelog_retention: "Последние 10 entries inline. Старше — переезд в docs/school/canon_training_CHANGELOG.md."

