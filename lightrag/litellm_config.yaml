model_list:
  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 1500

  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: qwen-turbo
    litellm_params:
      model: openai/qwen-turbo
      api_key: os.environ/DASHSCOPE_API_KEY
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1

  - model_name: grok-fast
    litellm_params:
      model: xai/grok-4-fast-non-reasoning
      api_key: os.environ/XAI_API_KEY

  - model_name: grok-max
    litellm_params:
      model: xai/grok-4.20-0309-reasoning
      api_key: os.environ/XAI_API_KEY

  - model_name: claude-sonnet-4.5
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: kimi-k2
    litellm_params:
      model: groq/moonshotai/kimi-k2-instruct
      api_key: os.environ/GROQ_API_KEY

  # Embeddings (ADR-001 от 2026-04-26): заменяет ollama all-minilm
  # text-embedding-3-small = 1536 dim, $0.02 / 1M tokens
  # На корпус канала Алексея (~150 постов × 1KB) ≈ $0.000003 (копейки)
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  num_retries: 2
  request_timeout: 60
  fallbacks:
    - groq-llama: ["deepseek-chat"]
    - kimi-k2: ["deepseek-chat", "qwen-turbo"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
