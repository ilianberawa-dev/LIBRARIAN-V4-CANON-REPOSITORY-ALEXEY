name: realty_lightrag

# LightRAG self-hosted (HKUDS/LightRAG) + LiteLLM OpenAIвЖТAnthropic bridge
# + Ollama (–Ґ–Ю–Ы–ђ–Ъ–Ю –і–ї—П embedding all-minilm 384-dim вАФ –Э–Х LLM).
#
# –Х–і–Є–љ—Л–є .env –≤ /opt/realty-portal/.env (–Ї–∞–љ–Њ–љ вАФ single secret vault).
# –°–µ—В—М realty_net вАФ –Њ–±—К—П–≤–ї–µ–љ–∞ –≤ ../docker-compose.yml, –Є—Б–њ–Њ–ї—М–Ј—Г–µ—В—Б—П –Ї–∞–Ї external.

networks:
  default:
    name: realty_net
    external: true

volumes:
  realty_lightrag_data:
    name: realty_lightrag_data
  realty_lightrag_inputs:
    name: realty_lightrag_inputs
  realty_ollama_models:
    name: realty_ollama_models

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: realty_litellm
    restart: unless-stopped
    env_file:
      - /opt/realty-portal/.env
    command:
      - "--model"
      - "anthropic/claude-haiku-4-5-20251001"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
      - "--drop_params"
    expose:
      - "4000"

  ollama:
    image: ollama/ollama:latest
    container_name: realty_ollama
    restart: unless-stopped
    volumes:
      - realty_ollama_models:/root/.ollama
    expose:
      - "11434"

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: realty_lightrag
    restart: unless-stopped
    depends_on:
      - litellm
      - ollama
    ports:
      - "127.0.0.1:9621:9621"
    volumes:
      - realty_lightrag_data:/app/data/rag_storage
      - realty_lightrag_inputs:/app/data/inputs
    env_file:
      - /opt/realty-portal/.env
    environment:
      HOST: 0.0.0.0
      PORT: 9621
      WORKING_DIR: /app/data/rag_storage
      INPUT_DIR: /app/data/inputs
      LLM_BINDING: openai
      LLM_MODEL: claude-haiku
      LLM_BINDING_HOST: http://realty_litellm:4000
      # LiteLLM proxy —А–∞–±–Њ—В–∞–µ—В –љ–∞ –≤–љ—Г—В—А–µ–љ–љ–µ–є —Б–µ—В–Є –±–µ–Ј auth вАФ –ї—О–±–Њ–є –љ–µ–њ—Г—Б—В–Њ–є
      # bearer –њ—А–Є–љ–Є–Љ–∞–µ—В—Б—П. "dummy" вАФ –љ–∞–Љ–µ—А–µ–љ–љ–Њ, —Б–µ–Ї—А–µ—В –љ–µ –љ—Г–ґ–µ–љ.
      LLM_BINDING_API_KEY: sk-proxy-dummy
      EMBEDDING_BINDING: ollama
      EMBEDDING_MODEL: all-minilm
      EMBEDDING_BINDING_HOST: http://realty_ollama:11434
      EMBEDDING_DIM: 384
      MAX_ASYNC: 2
